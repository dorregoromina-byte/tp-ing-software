name: Pipeline de IC UTN
on:
  push:
    branches: [ main ]
jobs:
  integracion:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar codigo del repositorio
        uses: actions/checkout@v4
      - name: 2. Configurar el entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: 3. Instalar dependencias limpias
        run: npm ci
      - name: 4. Ejecutar la Build del proyecto
        run: npm run build
      - name: 5. Ejecutar Pruebas Automatizadas
        run: npm test

  notify:
    runs-on: ubuntu-latest
    needs: integracion
    if: always()
    steps:
      - name: Enviar email de resultado
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: dorregoromina@gmail.com
          password: ${{ secrets.GMAIL_PASSWORD }}
          subject: >
            CI/CD - ${{ needs.integracion.result == 'success' && '✅ Deploy exitoso' || '❌ Falló el pipeline' }}
          to: dorregoromina@gmail.com
          from: dorregoromina@gmail.com
          body: |
            Resultado del pipeline CI/CD - UTN
            ─────────────────────────────
            Repositorio : ${{ github.repository }}
            Rama        : ${{ github.ref_name }}
            Commit      : ${{ github.sha }}
            Autor       : ${{ github.actor }}
            Estado tests: ${{ needs.integracion.result }}

            ${{ needs.integracion.result == 'success' && 'Los tests pasaron y el deploy en Vercel se realizó automáticamente.' || 'Hubo un error. Revisá la pestaña Actions en GitHub para más detalles.' }}

            Ver detalles: https://github.com/${{ github.repository }}/actions